<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ヒヨコ易｜今日の一卦</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      background:
        radial-gradient(circle at top left, rgba(255, 239, 170, 0.95), transparent 36%),
        radial-gradient(circle at bottom right, rgba(188, 215, 255, 0.9), transparent 38%),
        linear-gradient(135deg, #fff6da 0%, #f5d6e8 46%, #d7e4ff 100%);
      color: #3f3148;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: min(92vw, 560px);
      background: rgba(255, 255, 255, 0.82);
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      box-shadow: 0 22px 70px rgba(72, 54, 92, 0.24);
      padding: 34px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: #fff2b8;
      color: #8a6600;
      font-size: 14px;
      margin-bottom: 16px;
      box-shadow: inset 0 0 0 1px rgba(138, 102, 0, 0.13);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0.08em;
    }

    .lead {
      margin: 0 0 28px;
      line-height: 1.8;
      font-size: 15px;
    }

    .hexagram-card {
      width: 210px;
      height: 250px;
      margin: 0 auto 22px;
      border-radius: 28px;
      background: linear-gradient(145deg, #fffaf0, #f1dfb9 50%, #c9a86f);
      box-shadow:
        inset -12px -18px 26px rgba(93, 66, 31, 0.18),
        inset 12px 12px 24px rgba(255, 255, 255, 0.75),
        0 16px 34px rgba(72, 54, 92, 0.22);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.45s ease, box-shadow 0.45s ease;
      position: relative;
      overflow: hidden;
    }

    .hexagram-card::before {
      content: "🐣";
      position: absolute;
      top: 16px;
      right: 18px;
      font-size: 24px;
      opacity: 0.55;
    }

    .hexagram-card::after {
      content: "";
      position: absolute;
      width: 72%;
      height: 42%;
      top: 14%;
      left: 11%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transform: rotate(-20deg);
    }

    .hexagram-card.drawn {
      transform: rotate(1deg) scale(1.03);
      box-shadow:
        inset -12px -18px 26px rgba(93, 66, 31, 0.18),
        inset 12px 12px 24px rgba(255, 255, 255, 0.75),
        0 20px 42px rgba(72, 54, 92, 0.3);
    }

    .hexagram-lines {
      position: relative;
      z-index: 1;
      width: 118px;
      display: flex;
      flex-direction: column-reverse;
      gap: 12px;
    }

    .line {
      height: 12px;
      border-radius: 999px;
      background: #6b4a18;
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.35);
    }

    .line.broken {
      background: transparent;
      display: flex;
      justify-content: space-between;
      box-shadow: none;
    }

    .line.broken::before,
    .line.broken::after {
      content: "";
      display: block;
      width: 44%;
      height: 12px;
      border-radius: 999px;
      background: #6b4a18;
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.35);
    }

    .result {
      min-height: 190px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 249, 235, 0.78);
      border: 1px solid rgba(137, 103, 54, 0.16);
      margin-bottom: 22px;
    }

    .number {
      margin: 0 0 4px;
      font-size: 13px;
      color: #8a6600;
      font-weight: bold;
      letter-spacing: 0.06em;
    }

    .name {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: bold;
      color: #674075;
    }

    .keyword {
      margin: 0 0 12px;
      font-size: 15px;
      color: #8a6600;
      font-weight: bold;
    }

    .message {
      margin: 0;
      line-height: 1.85;
      font-size: 15px;
      text-align: left;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffc85f, #ff91c8);
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      padding: 14px 30px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(178, 93, 137, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(178, 93, 137, 0.34);
    }

    button:active {
      transform: translateY(0);
    }

    .note {
      margin: 18px 0 0;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(63, 49, 72, 0.72);
    }

    @media (max-width: 480px) {
      .container {
        padding: 28px 18px;
      }

      h1 {
        font-size: 26px;
      }

      .hexagram-card {
        width: 180px;
        height: 225px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="badge">🐣 ヒヨコ易</div>
    <h1>今日の一卦</h1>
    <p class="lead">心をしずめて、今の流れを一卦にたずねてみましょう。</p>

    <div id="card" class="hexagram-card">
      <div id="lines" class="hexagram-lines" aria-label="易の卦">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
      </div>
    </div>

    <section class="result" aria-live="polite">
      <p id="number" class="number">まだ卦は立っていません</p>
      <p id="name" class="name">筮竹は眠っています</p>
      <p id="keyword" class="keyword">ボタンを押して一卦引いてね</p>
      <p id="message" class="message">今日の流れ、心の整え方、次の一手のヒントをやさしく読み解きます。</p>
    </section>

    <button id="drawButton" type="button">易を立てる</button>

    <p class="note">※この易は日々の気づきのためのメッセージです。大切な決断は、現実の情報も合わせて考えてください。</p>
  </main>

  <script>

      { no: 1, name: "乾為天（けんいてん）", keyword: "創造・勢い・大きな始まり", lines: [1,1,1,1,1,1], message: "強い追い風が吹いています。ただし勢い任せは禁物。大きく進める時ほど、志と品位を忘れずに。" },
      { no: 2, name: "坤為地（こんいち）", keyword: "受容・育成・支える力", lines: [0,0,0,0,0,0], message: "今は前に出るより、受け止めて育てる時。焦らず土台を整えることで、後から大きく実ります。" },
      { no: 3, name: "水雷屯（すいらいちゅん）", keyword: "生みの苦しみ・始動・混沌", lines: [1,0,0,0,1,0], message: "始まりには混乱がつきもの。すぐに形にならなくても、芽は出ています。小さな一歩を大切に。" },
      { no: 4, name: "山水蒙（さんすいもう）", keyword: "学び・未熟・問い直し", lines: [0,1,0,0,0,1], message: "わからないことを恥じなくて大丈夫。今日は学ぶ姿勢が運を開きます。素直に聞くことが鍵。" },
      { no: 5, name: "水天需（すいてんじゅ）", keyword: "待つ・準備・時を待つ", lines: [1,1,1,0,1,0], message: "今は無理に押し切るより、待つことで流れが整います。準備をしながら、良いタイミングを見極めて。" },
      { no: 6, name: "天水訟（てんすいしょう）", keyword: "争い・主張・すれ違い", lines: [0,1,0,1,1,1], message: "意見の衝突に注意。正しさだけで押すより、引き際を見極めると大きな消耗を避けられます。" },
      { no: 7, name: "地水師（ちすいし）", keyword: "統率・秩序・チーム", lines: [0,1,0,0,0,0], message: "感情よりルールと役割を整える日。自分の中の指揮官を起こし、落ち着いて采配して。" },
      { no: 8, name: "水地比（すいちひ）", keyword: "親しむ・協力・つながり", lines: [0,0,0,0,1,0], message: "ひとりで抱え込まないで。信頼できる人とつながることで、安心と流れが戻ってきます。" },

      { no: 13, name: "天火同人（てんかどうじん）", keyword: "同志・仲間・開かれた協力", lines: [1,0,1,1,1,1], message: "同じ志を持つ人との縁が力になります。ひとりの正解より、共に進む道を探して。" },

      { no: 54, name: "雷沢帰妹（らいたくきまい）", keyword: "不安定な関係・順序・焦り", lines: [1,1,0,1,0,0], message: "勢いで合わせすぎると疲れそう。順序や立場をよく見て、焦らず整えて。" },

      { no: 64, name: "火水未済（かすいびせい）", keyword: "未完成・これから・最後の一歩", lines: [0,1,0,1,0,1], message: "まだ完成前。でも可能性は十分あります。焦らず、最後の一歩に必要な準備を整えて。" }
    ];

    const card = document.getElementById("card");
    const linesArea = document.getElementById("lines");
    const number = document.getElementById("number");
    const name = document.getElementById("name");
    const keyword = document.getElementById("keyword");
    const message = document.getElementById("message");
    const drawButton = document.getElementById("drawButton");

    function renderLines(lines) {
      linesArea.innerHTML = "";
      lines.forEach(value => {
        const line = document.createElement("div");
        line.className = value === 1 ? "line" : "line broken";
        linesArea.appendChild(line);
      });
    }

    function drawHexagram() {
      const randomIndex = Math.floor(Math.random() * hexagrams.length);
      const hexagram = hexagrams[randomIndex];

      card.classList.remove("drawn");
      void card.offsetWidth;
      card.classList.add("drawn");

      renderLines(hexagram.lines);
      number.textContent = `第${hexagram.no}卦`;
      name.textContent = hexagram.name;
      keyword.textContent = hexagram.keyword;
      message.textContent = hexagram.message;
    }

    drawButton.addEventListener("click", drawHexagram);
  </script>

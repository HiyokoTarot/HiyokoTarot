<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ヒヨコタロット</title>
  <style>
    body {
      font-family: sans-serif;
      background: #fff3f7;
      text-align: center;
      padding: 40px;
      color: #5a3a3a;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 360px;
      margin: 20px auto;
      box-shadow: 0 4px 12px #ddd;
    }
    button {
      background: #ffd86b;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🐣ヒヨコタロット</h1>
  <p>今日の一枚を引いてみてね</p>

  <button onclick="drawCard()">カードを引く</button>

  <div class="card">
<img id="cardImage"
     width="250"
     style="display:block;margin:auto;">
    <h2 id="cardName">まだ引いてないよ</h2>
    <p id="message">ボタンを押してね🐣</p>
  </div>

  <script type="module">
import { tarotCards } from "./logic/tarot.js";

window.drawCard =  function () {
  const card = tarotCards[Math.floor(Math.random() * tarotCards.length)];
  const isReversed = Math.random() < 0.5;

document.getElementById("cardImage").src =
   card.image;
if (isReversed) {
  img.style.transform = "rotate(180deg)";
} else {
  img.style.transform = "rotate(0deg)";
}

document.getElementById("cardName").textContent =
  `${card.number} ${card.emoji} ${card.name}` +
  (isReversed ? "（逆位置）" : "（正位置）");

  document.getElementById("message").innerHTML =
    isReversed ? card.reversed : card.upright;
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ヒヨコタロット</title>
  <style>
    body {
      font-family: sans-serif;
      background: #fff3f7;
      text-align: center;
      padding: 40px;
      color: #5a3a3a;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 360px;
      margin: 20px auto;
      box-shadow: 0 4px 12px #ddd;
    }
    button {
      background: #ffd86b;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🐣ヒヨコタロット</h1>
  <p>今日の一枚を引いてみてね</p>

  <button onclick="drawCard()">カードを引く</button>

  <div class="card">
    <h2 id="cardName">まだ引いてないよ</h2>
    <p id="message">ボタンを押してね🐣</p>
  </div>

  <script>
    const cards = [
      { name: "0 愚者", upright: "愚かな行為 浮浪者 ながれ者 大道芸人 間違った道<br> うっかり踏み外してしまった？ たまには息抜きも必要だよね 回り道しないと見えないものもあるよ", reversed: "少し無計画かも。今日は足元を確認してね" },
      { name: "1 魔術師", upright: "才能を使うタイミング", reversed: "自信不足かも。できることから始めよう" },
      { name: "2 女教皇", upright: "静かに直感を信じて", reversed: "考えすぎ注意。情報を整理してみて" },
      { name: "3 女帝", upright: "育つものを大切に", reversed: "甘やかしすぎ注意。境界線も大事" },
      { name: "4 皇帝", upright: "土台を整える日", reversed: "力みすぎかも。肩の力を抜いて" },
      { name: "5 教皇", upright: "学びや助言がヒント", reversed: "常識に縛られすぎないで" },
      { name: "6 恋人", upright: "心が選ぶ方へ", reversed: "迷いが出やすい日。焦って決めなくてOK" },
      { name: "7 戦車", upright: "勢いに乗って進もう", reversed: "暴走注意。方向を確認してから進もう" },
      { name: "8 力", upright: "やさしさが本当の強さ", reversed: "無理に強がらなくて大丈夫" },
      { name: "9 隠者", upright: "ひとり時間が答えをくれる", reversed: "閉じこもりすぎ注意。少し外の声も聞いて" },
      { name: "10 運命の輪", upright: "流れが変わるタイミング", reversed: "今は流れ待ち。焦らず整えて" },
      { name: "11 正義", upright: "バランスを見直して", reversed: "偏りに注意。公平な目で見てみよう" },
      { name: "12 吊るされた男", upright: "見方を変えるとき", reversed: "我慢しすぎかも。抜け道を探して" },
      { name: "13 死神", upright: "終わりは新しい始まり", reversed: "手放せないものを見直して" },
      { name: "14 節制", upright: "ちょうどいい加減を探して", reversed: "バランスが乱れ気味。休憩も大事" },
      { name: "15 悪魔", upright: "執着に気づく日", reversed: "抜け出すきっかけが見えてきそう" },
      { name: "16 塔", upright: "崩れた先に本音が見える", reversed: "小さな違和感を放置しないで" },
      { name: "17 星", upright: "希望を忘れないで", reversed: "理想が遠く見える日。でも消えてないよ" },
      { name: "18 月", upright: "不安な夜ほど焦らずに", reversed: "少しずつ霧が晴れてきそう" },
      { name: "19 太陽", upright: "明るく進んで大丈夫", reversed: "楽しむ余裕を取り戻して" },
      { name: "20 審判", upright: "もう一度チャンスが来る", reversed: "過去を責めすぎないで" },
      { name: "21 世界", upright: "ひとつの完成と祝福", reversed: "あと少し。仕上げを丁寧に" }
    ];

    function drawCard() {
      const card = cards[Math.floor(Math.random() * cards.length)];
      const isReversed = Math.random() < 0.5;

      document.getElementById("cardName").textContent =
        card.name + (isReversed ? "（逆位置）" : "（正位置）");

      document.getElementById("message").textContent =
        isReversed ? card.reversed : card.upright;
    }
  </script>
</body>
</html>

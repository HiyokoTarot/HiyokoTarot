<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ヒヨコルーン｜今日の一石</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      background: radial-gradient(circle at top, #fff4c9 0%, #f8d7e8 35%, #c8d9ff 100%);
      color: #4a3556;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: min(92vw, 520px);
      background: rgba(255, 255, 255, 0.78);
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(95, 72, 120, 0.22);
      padding: 32px 24px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: #fff3b8;
      color: #8b6a00;
      font-size: 14px;
      margin-bottom: 16px;
      box-shadow: inset 0 0 0 1px rgba(139, 106, 0, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0.06em;
    }

    .lead {
      margin: 0 0 28px;
      line-height: 1.8;
      font-size: 15px;
    }

    .rune-stone {
      width: 190px;
      height: 230px;
      margin: 0 auto 22px;
      border-radius: 48% 52% 46% 54% / 54% 46% 52% 48%;
      background: linear-gradient(145deg, #fff8df, #e8d4a7 48%, #c8a96e);
      box-shadow:
        inset -14px -18px 26px rgba(96, 71, 30, 0.18),
        inset 12px 12px 24px rgba(255, 255, 255, 0.75),
        0 14px 28px rgba(74, 53, 86, 0.22);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.45s ease, box-shadow 0.45s ease;
      position: relative;
      overflow: hidden;
    }

    .rune-stone::after {
      content: "";
      position: absolute;
      width: 72%;
      height: 42%;
      top: 18%;
      left: 12%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transform: rotate(-22deg);
    }

    .rune-stone.drawn {
      transform: rotate(-2deg) scale(1.03);
      box-shadow:
        inset -14px -18px 26px rgba(96, 71, 30, 0.18),
        inset 12px 12px 24px rgba(255, 255, 255, 0.75),
        0 18px 38px rgba(74, 53, 86, 0.28);
    }

    .rune-symbol {
      position: relative;
      z-index: 1;
      font-family: "Times New Roman", serif;
      font-size: 86px;
      color: #6f4d16;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.4);
    }

    .result {
      min-height: 154px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 248, 235, 0.75);
      border: 1px solid rgba(144, 112, 65, 0.15);
      margin-bottom: 22px;
    }

    .rune-name {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: bold;
      color: #6b4278;
    }

    .keyword {
      margin: 0 0 12px;
      font-size: 15px;
      color: #8b6a00;
      font-weight: bold;
    }

    .message {
      margin: 0;
      line-height: 1.8;
      font-size: 15px;
      text-align: left;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffcf6b, #ff91c8);
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      padding: 14px 28px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(178, 93, 137, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(178, 93, 137, 0.34);
    }

    button:active {
      transform: translateY(0);
    }

    .note {
      margin: 18px 0 0;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(74, 53, 86, 0.72);
    }

    @media (max-width: 480px) {
      .container {
        padding: 28px 18px;
      }

      h1 {
        font-size: 26px;
      }

      .rune-stone {
        width: 165px;
        height: 205px;
      }

      .rune-symbol {
        font-size: 76px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="badge">🐣 ヒヨコルーン</div>
    <h1>今日の一石</h1>
    <p class="lead">心をしずめて、今のあなたに必要なルーンを一つ引いてみましょう。</p>

    <div id="stone" class="rune-stone">
      <div id="symbol" class="rune-symbol">ᚠ</div>
    </div>

    <section class="result" aria-live="polite">
      <p id="name" class="rune-name">まだ石は眠っています</p>
      <p id="keyword" class="keyword">ボタンを押して一石引いてね</p>
      <p id="message" class="message">今日の流れ、心の整え方、次の一歩のヒントをやさしく読み解きます。</p>
    </section>

    <button id="drawButton" type="button">ルーンを引く</button>

    <p class="note">※このルーンは日々の気づきのためのメッセージです。大切な決断は現実の情報も合わせて考えてください。</p>
  </main>

  <script>
    const runes = [
      {
        symbol: "ᚠ",
        name: "フェフ / Fehu",
        keyword: "豊かさ・成果・所有",
        message: "これまで積み重ねてきたものが形になりやすい日。受け取ることを怖がらず、今ある豊かさにも目を向けてみて。"
      },
      {
        symbol: "ᚢ",
        name: "ウルズ / Uruz",
        keyword: "生命力・勇気・突破",
        message: "少し力が必要な場面がありそう。でも、今のあなたには乗り越える体力と芯があります。焦らず一歩ずつ。"
      },
      {
        symbol: "ᚦ",
        name: "スリサズ / Thurisaz",
        keyword: "防御・警戒・境界線",
        message: "今日は勢いだけで進むより、ひと呼吸置くのが吉。自分を守る境界線を意識して、無理なものには無理と言って大丈夫。"
      },
      {
        symbol: "ᚨ",
        name: "アンスズ / Ansuz",
        keyword: "言葉・知恵・メッセージ",
        message: "大切なヒントは、会話や文章の中にありそう。伝えること、聞くこと、学ぶことにツキがあります。"
      },
      {
        symbol: "ᚱ",
        name: "ライド / Raidho",
        keyword: "旅・流れ・正しい道筋",
        message: "物事が少しずつ動き出す気配。遠回りに見えても、今の道には意味があります。流れを信じて進んでみて。"
      },
      {
        symbol: "ᚲ",
        name: "ケナズ / Kenaz",
        keyword: "火・ひらめき・創造",
        message: "小さな灯りが心にともる日。アイデアや創作に向いています。思いついたことは、忘れないうちにメモして。"
      },
      {
        symbol: "ᚷ",
        name: "ゲーボ / Gebo",
        keyword: "贈り物・ご縁・交換",
        message: "誰かとのやり取りに幸運がありそう。受け取ることと差し出すこと、そのバランスを大切に。"
      },
      {
        symbol: "ᚹ",
        name: "ウンジョー / Wunjo",
        keyword: "喜び・調和・満足",
        message: "心がふっと軽くなる出来事があるかも。完璧を目指すより、今ある小さな喜びを味わって。"
      },
      {
        symbol: "ᚺ",
        name: "ハガラズ / Hagalaz",
        keyword: "変化・嵐・浄化",
        message: "予定外のことが起きても、それは古い流れを洗い流すきっかけかもしれません。今日は無理に抗わず、安全第一で。"
      },
      {
        symbol: "ᚾ",
        name: "ナウシズ / Nauthiz",
        keyword: "忍耐・必要・制限",
        message: "今すぐ思い通りにならなくても大丈夫。足りないものを責めるより、本当に必要なものを見極める時です。"
      },
      {
        symbol: "ᛁ",
        name: "イサ / Isa",
        keyword: "停止・静寂・保留",
        message: "今日は動かない勇気が味方になります。結論を急がず、心と状況が溶けるまで待ってみて。"
      },
      {
        symbol: "ᛃ",
        name: "ヤラ / Jera",
        keyword: "収穫・季節・積み重ね",
        message: "すぐに結果が出なくても、流れは育っています。小さな継続が、あとで大きな実りになります。"
      },
      {
        symbol: "ᛇ",
        name: "エイワズ / Eihwaz",
        keyword: "再生・守り・粘り強さ",
        message: "一度立ち止まることで、むしろ強くなれる日。しぶとさと柔らかさ、どちらもあなたの力です。"
      },
      {
        symbol: "ᛈ",
        name: "ペルス / Perthro",
        keyword: "運命・秘密・偶然",
        message: "予想外の流れにヒントがあります。すべてをコントロールしようとせず、偶然の扉を少し開けてみて。"
      },
      {
        symbol: "ᛉ",
        name: "アルジズ / Algiz",
        keyword: "守護・直感・安全",
        message: "今日は直感がよく働きそう。違和感は無視しないで。あなたを守るための小さなサインかもしれません。"
      },
      {
        symbol: "ᛋ",
        name: "ソウェイル / Sowilo",
        keyword: "太陽・成功・活力",
        message: "明るい方向へ進む力があります。隠れずに、自分の良さを少し表に出してみて。"
      },
      {
        symbol: "ᛏ",
        name: "ティワズ / Tiwaz",
        keyword: "正義・勝利・決断",
        message: "筋を通すことが力になる日。迷った時は、短期の得よりも自分が誇れる選択を。"
      },
      {
        symbol: "ᛒ",
        name: "ベルカナ / Berkano",
        keyword: "育成・誕生・やさしさ",
        message: "何かが静かに育っています。急かさず、守りながら育てることで、やがて形になっていきます。"
      },
      {
        symbol: "ᛖ",
        name: "エワズ / Ehwaz",
        keyword: "信頼・協力・前進",
        message: "ひとりで抱え込まなくて大丈夫。信頼できる人や流れに乗ることで、進みやすくなります。"
      },
      {
        symbol: "ᛗ",
        name: "マンナズ / Mannaz",
        keyword: "人間関係・自己理解・共同体",
        message: "自分を知ることが、人との関係を整える鍵になります。今日は“私は本当はどうしたい？”と聞いてみて。"
      },
      {
        symbol: "ᛚ",
        name: "ラグズ / Laguz",
        keyword: "水・感情・流れ",
        message: "感情の波にヒントがあります。無理に整えようとせず、今の気持ちをそのまま見つめてみて。"
      },
      {
        symbol: "ᛜ",
        name: "イングワズ / Ingwaz",
        keyword: "内なる力・準備・完成前夜",
        message: "表にはまだ見えなくても、内側では準備が進んでいます。今日は焦らず、力を蓄える時間に。"
      },
      {
        symbol: "ᛞ",
        name: "ダガズ / Dagaz",
        keyword: "夜明け・転換・希望",
        message: "流れが切り替わる兆し。小さな気づきが、これからの景色を大きく変えてくれそうです。"
      },
      {
        symbol: "ᛟ",
        name: "オシラ / Othala",
        keyword: "家族・継承・居場所",
        message: "あなたの根っこにあるものが力になります。家、家族、受け継いできたものを見直すと安心が戻りそう。"
      }
    ];

    const stone = document.getElementById("stone");
    const symbol = document.getElementById("symbol");
    const name = document.getElementById("name");
    const keyword = document.getElementById("keyword");
    const message = document.getElementById("message");
    const drawButton = document.getElementById("drawButton");

    function drawRune() {
      const randomIndex = Math.floor(Math.random() * runes.length);
      const rune = runes[randomIndex];

      stone.classList.remove("drawn");
      void stone.offsetWidth;
      stone.classList.add("drawn");

      symbol.textContent = rune.symbol;
      name.textContent = rune.name;
      keyword.textContent = rune.keyword;
      message.textContent = rune.message;
    }

    drawButton.addEventListener("click", drawRune);
  </script>
</body>
</html>

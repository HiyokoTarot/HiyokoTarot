<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>さやこちょっぱや占いぷろぐらむ</title>
  <style>
    body {
      font-family: sans-serif;
      background: #fff3f7;
      text-align: center;
      padding: 40px;
      color: #5a3a3a;
    }

.card {
  background: white;
  border-radius: 20px;
  padding: 24px;
  max-width: 720px;
  margin: 20px auto;
  box-shadow: 0 4px 12px #ddd;

  display: flex;
  align-items: center;
  gap: 28px;
  text-align: left;
}



.card img {
  width: 250px;
  flex-shrink: 0;
}

    button {
      background: #ffd86b;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
    }

.cardText {
  flex: 1;
}

    .rune-stone {
      width: 190px;
      height: 230px;
      margin: 0 auto 22px;
      border-radius: 48% 52% 46% 54% / 54% 46% 52% 48%;
      background: linear-gradient(145deg, #fff8df, #e8d4a7 48%, #c8a96e);
      box-shadow:
        inset -14px -18px 26px rgba(96, 71, 30, 0.18),
        inset 12px 12px 24px rgba(255, 255, 255, 0.75),
        0 14px 28px rgba(74, 53, 86, 0.22);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.45s ease, box-shadow 0.45s ease;
      position: relative;
      overflow: hidden;
    }

    .rune-stone::after {
      content: "";
      position: absolute;
      width: 72%;
      height: 42%;
      top: 18%;
      left: 12%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transform: rotate(-22deg);
    }

    .rune-stone.drawn {
      transform: rotate(-2deg) scale(1.03);
      box-shadow:
        inset -14px -18px 26px rgba(96, 71, 30, 0.18),
        inset 12px 12px 24px rgba(255, 255, 255, 0.75),
        0 18px 38px rgba(74, 53, 86, 0.28);
    }

    .rune-symbol {
      position: relative;
      z-index: 1;
      font-family: "Times New Roman", serif;
      font-size: 86px;
      color: #6f4d16;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.4);
    }



  </style>
</head>
<body>
  <h1>🐣さやこちょっぱや占いぷろぐらむ🐣ver1.4</h1>
  <p>今日の一枚を引いてみてね</p>

  <button onclick="drawCard()">カードを引く</button>

<div id="result"></div>
<div id="runeResult"></div>
<div id="ekiResult"></div>

<script type="module">
import { tarotCards } from "./logic/tarot.js";
import { runes } from "./logic/rune.js";
import { drawHexagram } from "./logic/eki.js";

window.drawCard = function () {
  const positions = ["① 現状", "② 相手の気持ち", "③ 今後の流れ"];

  const shuffled = [...tarotCards].sort(() => Math.random() - 0.5);
  const selectedCards = shuffled.slice(0, 3);

  let html = "";

  selectedCards.forEach((card, index) => {
    const isReversed = Math.random() < 0.5;
    const message = isReversed ? card.reversed : card.upright;

    html += `
      <div class="card">
        <img
          src="${card.image}"
          width="250"
          style="transform: rotate(${isReversed ? 180 : 0}deg);"
        >

        <div class="cardText">
          <h3>${positions[index]}</h3>
          <h2>
            ${card.number} ${card.emoji} ${card.name}
            ${isReversed ? "（逆位置）" : "（正位置）"}
          </h2>
          <p>${message}</p>
        </div>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;

drawRune();

drawEki();

};


function drawRune() {
  const rune = runes[Math.floor(Math.random() * runes.length)];

  const html = `
    <div class="card">
      <div style="font-size: 90px; width: 250px; text-align: center;">
        ${rune.symbol}
      </div>

      <div class="cardText">
        <h3>ᚱ 今すべきこと</h3>
        <h2>${rune.name}</h2>
        <p><strong>${rune.keyword}</strong></p>
        <p>${rune.message}</p>
      </div>
    </div>
  `;

  document.getElementById("runeResult").innerHTML = html;
};

function drawEki() {

function lineSymbol(n) {
  if (n === 6) return "6  -- -- 老陰";
  if (n === 7) return "7  ----- 少陽";
  if (n === 8) return "8  -- -- 少陰";
  if (n === 9) return "9  ----- 老陽";
}

  const eki = drawHexagram();





const honkaText =
  eki.lines
    .slice()
    .reverse()
    .map(lineSymbol)
    .join("<br>");

const shikaText =
  eki.changedHexagram
    .slice()
    .reverse()
    .map(lineSymbol)
    .join("<br>");

  const html = `
    <div class="card">
      <div class="cardText">

<h3>☯ 易</h3>

<h4>本卦：${eki.honka?.name}</h4>
<p>${eki.honka?.keyword}</p>
<p>${eki.honka?.message}</p>

<div>${honkaText}</div>

<hr>
<p>変爻：${eki.changedLines.join("・") || "なし"}</p>
<hr>

<h4>之卦：${eki.shika?.name}</h4>
<p>${eki.shika?.keyword}</p>
<p>${eki.shika?.message}</p>

<div>${shikaText}</div>
    </div>
  </div>
  `;

  document.getElementById("ekiResult").innerHTML = html;
}


</script>
</body>
</html>
